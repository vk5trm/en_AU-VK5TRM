###############################################################################
#
# Online TTS (Text-to-Speech) configuration file for the tts_handler.sh script.
#
###############################################################################

# TTS Service provider: "google", "azure", "aws" or custom URL endpoint
TTS_PROVIDER="google"

# Google TTS settings
GOOGLE_API_KEY="YOUR API KEY HERE"
GOOGLE_LANGUAGE="en-AU"

# Azure TTS settings
AZURE_API_KEY=""
AZURE_REGION="australiaeast"
AZURE_VOICE="en-AU-NatashaNeural"

# AWS Polly settings
AWS_REGION="ap-southeast-2"
AWS_VOICE_ID="Olivia"

# Local TTS fallback: espeak or festival
LOCAL_TTS_ENGINE="espeak"
ESPEAK_VOICE="en-au"
ESPEAK_SPEED=150
ESPEAK_PITCH=50

# Cache directory for generated TTS audio
TTS_CACHE_DIR="/tmp/svxlink_tts_cache"

# Apply these effects to TTS-generated audio clips (same as filter_sounds.cfg)
TTS_EFFECT="silence 1 0.1 -61d reverse silence 1 0.1 -61d reverse compand 0.01,0.1 3:-55,-25,-5 -15 -50 0.01 tempo 1"

# Target audio format settings
TTS_TARGET_RATE=16000
TTS_ENDIAN="L"
TTS_ENCODING=""
